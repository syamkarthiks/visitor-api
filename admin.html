<!DOCTYPE html>
<html>
<head>
<title>Visitor Panel</title>

<style>
body{background:#0b1220;color:white;font-family:Poppins;padding:20px}
h1{text-align:center}

#loginBox{
  position:fixed;inset:0;
  background:#000;display:flex;
  justify-content:center;align-items:center;
}

.box{
  background:#111;padding:30px;border-radius:10px;
}

button{padding:8px 15px;background:cyan;border:none;border-radius:6px}
input{padding:8px;border-radius:6px;border:none}

.card{
  background:#111;margin:10px 0;padding:15px;border-radius:10px;
}

.top{
  display:flex;justify-content:space-between;
}

.more{
  display:none;font-size:12px;margin-top:10px;color:#ccc;
}
</style>
</head>

<body>

<div id="loginBox">
  <div class="box">
    <h3>Enter Password </h3>
    <input id="pass">
    <button onclick="login()">Enter</button>
  </div>
</div>

<h1>Visitor Dashboard !🚀</h1>

<button onclick="loadData()">🔄 Refresh</button>

<div id="data"></div>

<script>

let DATA = [];

function login(){
  const pass = document.getElementById("pass").value;

  fetch("https://sksvisit.vercel.app/api/data", {
    headers:{ Authorization: "Bearer " + pass }
  })
  .then(res => res.json())
  .then(d=>{
    DATA = d;
    document.getElementById("loginBox").style.display="none";
    render(DATA);
  });
}

function loadData(){
  fetch("https://sksvisit.vercel.app/api/data", {
    headers:{ Authorization: "Bearer SY4M" }
  })
  .then(res=>res.json())
  .then(d=>{
    DATA = d;
    render(DATA);
  });
}

function render(data){
  let html="";

  data.forEach((v,i)=>{

    html+=`
    <div class="card">

      <div class="top">
        <div>
          <b>${v.time}</b><br>
          ${v.city}
        </div>

        <button onclick="toggle(${i})">More</button>
      </div>

      <div class="more" id="m${i}">
        IP: ${v.ip}<br>
        ISP: ${v.isp}<br>
        Region: ${v.region}<br>
        Device: ${v.device}<br>
        Browser: ${v.browser}<br>
        Battery: ${v.battery}<br>
        Charging: ${v.charging}<br>
        Referrer: ${v.referrer}
      </div>

    </div>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

function toggle(i){
  const el = document.getElementById("m"+i);
  el.style.display = el.style.display==="block" ? "none" : "block";
}

</script>

</body>
</html>
