<!DOCTYPE html>
<html>
<head>
<title>Visitors Panel</title>

<style>
body{
  background:#0b1220;
  color:white;
  font-family:Poppins;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

/* login */
#loginBox{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.box{
  background:#111;
  padding:30px;
  border-radius:10px;
  text-align:center;
}

input{
  padding:10px;
  border-radius:6px;
  border:none;
  margin-top:10px;
}

button{
  padding:8px 15px;
  background:cyan;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}

/* stats */
.stats{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.stat{
  background:#111;
  padding:10px 15px;
  border-radius:10px;
  box-shadow:0 0 10px cyan;
}

/* cards */
.card{
  background:#111;
  margin:10px 0;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,255,255,0.2);
}

.top{
  display:flex;
  justify-content:space-between;
}

.more{
  display:none;
  font-size:13px;
  margin-top:10px;
  color:#ccc;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="box">
    <h3>Enter Password</h3>
    <input id="pass" placeholder="Password">
    <br>
    <button onclick="login()">Enter</button>
  </div>
</div>

<h1>Visitors Dashboard .🚀</h1>

<button onclick="loadData()">🔄 Refresh</button>

<div class="stats" id="stats"></div>
<div id="data"></div>

<script>

let DATA = [];

// LOGIN
function login(){
  const pass = document.getElementById("pass").value;

  fetch("https://sksvisit.vercel.app/api/data", {
    headers:{ Authorization: "Bearer " + pass }
  })
  .then(res => res.json())
  .then(d=>{
    DATA = d;
    document.getElementById("loginBox").style.display="none";
    render(DATA);
  })
  .catch(()=>alert("Wrong password"));
}

// REFRESH
function loadData(){
  fetch("https://sksvisit.vercel.app/api/data", {
    headers:{ Authorization: "Bearer SY4M" }
  })
  .then(res=>res.json())
  .then(d=>{
    DATA = d;
    render(DATA);
  });
}

// STATS
function renderStats(data){
  const total = data.length;
  const mobile = data.filter(v=>v.device !== "Desktop").length;
  const desktop = data.filter(v=>v.device === "Desktop").length;

  document.getElementById("stats").innerHTML = `
    <div class="stat">👀 Total: ${total}</div>
    <div class="stat">📱 Mobile: ${mobile}</div>
    <div class="stat">💻 Desktop: ${desktop}</div>
  `;
}

// SAFE VALUE
function safe(val){
  if(!val || val === "Unknown") return "—";
  return val;
}

// FIX TIME
function formatTime(t){
  if(!t) return "—";

  const d = new Date(t);

  if(isNaN(d)) return t;

  return d.toLocaleString("en-IN", {
    timeZone: "Asia/Kolkata"
  });
}

// RENDER
function render(data){
  renderStats(data);

  let html="";

  data.forEach((v,i)=>{
    html+=`
    <div class="card">

      <div class="top">
        <div>
          <b>${formatTime(v.time)}</b><br>
          📍 ${safe(v.city)}, ${safe(v.region)}
        </div>

        <button onclick="toggle(${i})">More</button>
      </div>

      <div class="more" id="m${i}">
        🌐 IP: ${safe(v.ip)}<br>
        🛰️ ISP: ${safe(v.isp)}<br>
        📱 Device: ${safe(v.device)}<br>
        🌍 Browser: ${safe(v.browser)}<br>
        🔋 Battery: ${safe(v.battery)}<br>
        ⚡ Charging: ${v.charging ? "Yes" : "No"}<br>
        🔗 Referrer: ${safe(v.referrer)}
      </div>

    </div>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

// TOGGLE DETAILS
function toggle(i){
  const el = document.getElementById("m"+i);
  el.style.display = el.style.display==="block" ? "none" : "block";
}

</script>

</body>
</html>
